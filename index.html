<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Manisha ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5f9e,#ffc0d9);
overflow:hidden;
}

.card{

width:90%;
max-width:370px;

padding:30px;

background:white;

border-radius:25px;

text-align:center;

box-shadow:0 15px 35px rgba(0,0,0,.2);

}

h1{

color:#ff2d75;

margin-bottom:15px;

}

p{

font-size:18px;

line-height:1.6;

margin-bottom:25px;

}

button{

padding:14px 28px;

border:none;

border-radius:50px;

font-size:18px;

cursor:pointer;

margin:8px;

transition:.3s;

}

#yes{

background:#ff2d75;

color:white;

}

#no{

background:#ddd;

}

button:hover{

transform:scale(1.08);

}

</style>

</head>

<body>

<div class="card" id="card">

<h1>Hey Manisha ❤️</h1>

<p>

Before I say anything...

I want you to answer one tiny question. 🥺

</p>

<button id="yes">

I'm Ready 💖

</button>

<button id="no">

Not Ready 😅

</button>

</div>

<script>

const card=document.getElementById("card");

const yes=document.getElementById("yes");

const no=document.getElementById("no");

yes.onclick=function(){

card.innerHTML=`

<h1>Yay ❤️</h1>

<p>

Thank you for trusting me.

Let's continue...🥹

</p>

<button id="next">

Continue ➜

</button>

`;

}

no.onclick=function(){

alert("Wrong answer Manisha 😂❤️");

}

// ===== PART 2 =====

// Continue Button
document.addEventListener("click",function(e){

if(e.target.id=="next"){

card.innerHTML=`

<h1>One Small Question ❤️</h1>

<p id="line">

🌹

तिमी हाँस्दा...

मेरो संसार नै उज्यालो हुन्छ।🥹

</p>

<button id="yes2">

YES 💕

</button>

<button id="no2">

NO 😜

</button>

`;

}

});

// Funny Messages

const jokes=[

"Wrong Button 😂",

"Think Again 😏",

"Momo Khuwauxu 🍜",

"Pleaseeeee 🥹",

"Your Smile Already Said YES ❤️"

];

let i=0;


// NO Button Run

document.addEventListener("mouseover",function(e){

if(e.target.id=="no2"){

const x=Math.random()*220-110;

const y=Math.random()*220-110;

e.target.style.transform=`translate(${x}px,${y}px)`;

}

});


// NO Click

document.addEventListener("click",function(e){

if(e.target.id=="no2"){

alert(jokes[i]);

i++;

if(i>=jokes.length){

i=0;

}

}

});


// YES Click

document.addEventListener("click",function(e){

if(e.target.id=="yes2"){

card.innerHTML=`

<h1>🥹 Awww Manisha ❤️</h1>

<p>

I knew you wouldn't break my heart.

But...

I still have one last surprise for you. 💕

</p>

<button id="last">

Continue 🌹

</button>

`;

}

});

// ===== PART 3 =====

// Final Continue Button
document.addEventListener("click", function(e){

if(e.target.id=="last"){

card.innerHTML=`

<h1>💖 Dear Manisha 💖</h1>

<p style="font-size:18px;line-height:1.8">

Since the day I met you...

❤️ Every moment became special.

🌹

"तिम्रो मुस्कानले मेरो दिन उज्यालो बनाउँछ।

तिमी बिना केही अधुरो-अधुरो लाग्छ।"

🥹❤️

Will You Be My Girlfriend?

</p>

<button id="accept">

YES ❤️

</button>

<button id="reject">

NO 🙈

</button>

`;

}

});


// Final NO Button Run Away

document.addEventListener("mouseover",function(e){

if(e.target.id=="reject"){

let x=Math.random()*250-120;

let y=Math.random()*250-120;

e.target.style.transform=`translate(${x}px,${y}px)`;

}

});


// Final YES

document.addEventListener("click",function(e){

if(e.target.id=="accept"){

card.innerHTML=`

<h1 style="color:#ff2d75;font-size:38px">

YAYYYYY ❤️🥳

</h1>

<p style="font-size:20px;line-height:1.8">

Officially...

You just made me the happiest person today. 🥹❤️

<br><br>

😂 No Return

😂 No Refund

❤️ Lifetime Happiness

<br><br>

I Love You So Much Manisha ❤️

</p>

`;

createHearts();

}

});


// Floating Hearts

function createHearts(){

setInterval(()=>{

const heart=document.createElement("div");

heart.innerHTML=["❤️","💖","💕","🌸","✨"][Math.floor(Math.random()*5)];

heart.style.position="fixed";

heart.style.left=Math.random()*100+"vw";

heart.style.top="-20px";

heart.style.fontSize=(20+Math.random()*20)+"px";

heart.style.transition="5s linear";

heart.style.zIndex="9999";

document.body.appendChild(heart);

setTimeout(()=>{

heart.style.top="110vh";

},100);

setTimeout(()=>{

heart.remove();

},5200);

},250);

}


// Small Confetti

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div");

c.innerHTML="🎉";

c.style.position="fixed";

c.style.left=Math.random()*100+"vw";

c.style.top="-30px";

c.style.fontSize="25px";

c.style.transition="4s linear";

document.body.appendChild(c);

setTimeout(()=>{

c.style.top="110vh";

},50);

setTimeout(()=>{

c.remove();

},4200);

}

}


// Confetti after YES

document.addEventListener("click",function(e){

if(e.target.id=="accept"){

confetti();

}

});
  
</script>

</body>
</html>
