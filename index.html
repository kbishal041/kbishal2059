<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Manisha ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5f9e,#ffc0d9);
overflow:hidden;
}

.card{

width:90%;
max-width:370px;

padding:30px;

background:white;

border-radius:25px;

text-align:center;

box-shadow:0 15px 35px rgba(0,0,0,.2);

}

h1{

color:#ff2d75;

margin-bottom:15px;

}

p{

font-size:18px;

line-height:1.6;

margin-bottom:25px;

}

button{

padding:14px 28px;

border:none;

border-radius:50px;

font-size:18px;

cursor:pointer;

margin:8px;

transition:.3s;

}

#yes{

background:#ff2d75;

color:white;

}

#no{

background:#ddd;

}

button:hover{

transform:scale(1.08);

}

</style>

</head>

<body>

<div class="card" id="card">

<h1>Hey Manisha ❤️</h1>

<p>

Before I say anything...

I want you to answer one tiny question. 🥺

</p>

<button id="yes">

I'm Ready 💖

</button>

<button id="no">

Not Ready 😅

</button>

</div>

<script>

const card=document.getElementById("card");

const yes=document.getElementById("yes");

const no=document.getElementById("no");

yes.onclick=function(){

card.innerHTML=`

<h1>Yay ❤️</h1>

<p>

Thank you for trusting me.

Let's continue...🥹

</p>

<button id="next">

Continue ➜

</button>

`;

}

no.onclick=function(){

alert("Wrong answer Manisha 😂❤️");

}

</script>

</body>
</html>
