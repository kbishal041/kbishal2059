<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Manisha ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#ff4b91,#ff9acb);
}

.card{

width:90%;
max-width:360px;

padding:30px;

border-radius:20px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(12px);

box-shadow:0 10px 30px rgba(0,0,0,.25);

text-align:center;

color:white;

}

h1{

font-size:32px;

margin-bottom:15px;

}

p{

font-size:18px;

line-height:1.6;

margin-bottom:25px;

}

button{

padding:14px 28px;

border:none;

border-radius:50px;

font-size:18px;

cursor:pointer;

margin:8px;

transition:.3s;

}

#yes{

background:white;

color:#ff2d75;

font-weight:bold;

}

#yes:hover{

transform:scale(1.08);

}

#no{

background:#ff2d75;

color:white;

position:relative;

}

.fade{

animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="card fade" id="card">

<h1>Hey Manisha ❤️</h1>

<p>

I have something special to ask you... 🥺

Please answer honestly.

</p>

<button id="yes">

I'm Ready ❤️

</button>

<button id="no">

Not Ready 😅

</button>

</div>

<script>

const yes=document.getElementById("yes");

const no=document.getElementById("no");

yes.onclick=()=>{

document.getElementById("card").innerHTML=`

<h1>One Small Question 🌹</h1>

<p>

Before I ask...

I just want to say...

Your smile is my favorite notification. ❤️🥹

</p>

<button id="next">

Continue 💕

</button>

`;

}

no.onclick=()=>{

alert("Wrong answer Manisha 😂❤️");

}

</script>

</body>
</html>
